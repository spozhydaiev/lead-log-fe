# Snapshot of the Lead Log backend OpenAPI contract.
# Source: lead-log/api/openapi_old.yaml
# Update this file whenever the frontend starts using a changed API contract.
openapi: 3.1.0
info:
  title: Lead Log private web API
  version: 1.0.0
  description: "Multi-user API using HttpOnly opaque session cookies. Browser clients must use credentials: include; unsafe methods require an allowed Origin. Telegram identifiers are never exposed."
servers: [{url: /}]
security: [{cookieAuth: []}]
paths:
  /healthz:
    get:
      security: []
      responses: {'200': {description: Process is alive, content: {application/json: {schema: {$ref: '#/components/schemas/Health'}}}}}
  /readyz:
    get:
      security: []
      responses:
        '200': {description: Database is ready, content: {application/json: {schema: {$ref: '#/components/schemas/Ready'}}}}
        '503': {description: Database is unavailable, content: {application/json: {schema: {$ref: '#/components/schemas/Ready'}}}}
  /api/v1/auth/register:
    post:
      security: []
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RegisterRequest'}}}}
      responses:
        '201': {description: Registered and session cookie set, content: {application/json: {schema: {$ref: '#/components/schemas/CurrentUserEnvelope'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '409': {description: Duplicate account, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
  /api/v1/auth/login:
    post:
      security: []
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/LoginRequest'}}}}
      responses:
        '200': {description: Logged in and session cookie set, content: {application/json: {schema: {$ref: '#/components/schemas/CurrentUserEnvelope'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/auth/logout:
    post:
      responses:
        '204': {description: Current session revoked and cookie cleared}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/auth/session:
    get:
      responses:
        '200': {description: Current session, content: {application/json: {schema: {$ref: '#/components/schemas/CurrentUserEnvelope'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/integrations/telegram/link:
    post:
      description: Creates a short-lived one-time Telegram bot deep link. The token is random, stored hashed, and not logged.
      responses:
        '200': {description: Deep link, content: {application/json: {schema: {$ref: '#/components/schemas/TelegramLinkEnvelope'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/integrations/telegram/status:
    get:
      responses:
        '200': {description: Telegram connection status without Telegram identifiers, content: {application/json: {schema: {type: object, properties: {data: {$ref: '#/components/schemas/TelegramStatus'}}}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/integrations/telegram:
    delete:
      responses:
        '204': {description: Telegram account unlinked; historical user data remains}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/me:
    get:
      responses:
        '200': {description: Safe current-user profile, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/Me'}}}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/notes:
    get:
      description: Notes history page. Returns private current-user notes only, ordered by created_at DESC and id DESC. Cursor pagination is opaque, preserves the normalized filter context, and does not use offsets. Date filters use YYYY-MM-DD calendar dates in the authenticated user's stored timezone; from is inclusive local start-of-day and to is inclusive local calendar day converted internally to a half-open UTC range. Search trims whitespace, requires 2-200 Unicode characters when present, searches persisted raw text and summary only, and never calls an LLM. Responses include Cache-Control no-store.
      parameters:
        - {name: limit, in: query, description: Page size. Defaults to 20; values outside 1..50 are rejected., schema: {type: integer, minimum: 1, maximum: 50, default: 20}}
        - {name: cursor, in: query, description: Opaque next_cursor from a prior response. It is valid only with the same explicit filters; invalid or mismatched cursors return 400., schema: {type: string}}
        - {name: from, in: query, description: Inclusive local start date in authenticated user's timezone (YYYY-MM-DD). May be omitted., schema: {type: string, format: date, example: '2026-07-01'}}
        - {name: to, in: query, description: Inclusive local end date in authenticated user's timezone (YYYY-MM-DD). May be omitted., schema: {type: string, format: date, example: '2026-07-17'}}
        - {name: status, in: query, description: Exact canonical processing status. Omit to include pending, processing, processed, and failed notes., schema: {$ref: '#/components/schemas/ProcessingStatus'}}
        - {name: query, in: query, description: Case-insensitive substring search over persisted raw note text and summary. Trimmed; empty is absent; non-empty must be 2-200 Unicode characters., schema: {type: string, minLength: 2, maxLength: 200}}
      responses:
        '200': {description: Stable newest-first notes history page, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/NotesHistoryEnvelope'}, examples: {first_page: {value: {data: {items: [{id: note_184, raw_text: Discussed retry policy with Adlet., summary: Retry policy discussion., processing_status: processed, created_at: '2026-07-17T09:24:00Z', processed_at: '2026-07-17T09:24:04Z', extracted_counts: {actions: 2, people: 1, decisions: 1, entities: 2}, preview: {people: [{id: person_12, display_name: Adlet}], tickets: [CH-1234], tags: [message-processor]}}], page: {next_cursor: opaque-cursor, has_more: true}}}}, empty_result: {value: {data: {items: [], page: {next_cursor: null, has_more: false}}}}, date_range: {summary: Use /api/v1/notes?from=2026-07-01&to=2026-07-17}, status_filter: {summary: Use /api/v1/notes?status=processed}, search_query: {summary: Use /api/v1/notes?query=retry%20policy}, next_page: {summary: Use /api/v1/notes?cursor=<next_cursor> with the same filters}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
    post:
      description: Creates a pending note without waiting for LLM enrichment. Not idempotent in API v1.
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [text], properties: {text: {type: string, minLength: 1, maxLength: 10000}}, example: {text: Discuss retry policy with the team.}}}}}
      responses:
        '201': {description: Pending note created, content: {application/json: {schema: {type: object, properties: {data: {$ref: '#/components/schemas/NoteCreated'}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '413': {description: Request too large, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
        '415': {description: Unsupported media type, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
  /api/v1/notes/{id}:
    get:
      description: Returns the persisted note and its bounded structured enrichment; never starts enrichment.
      parameters: [{name: id, in: path, required: true, schema: {type: string, pattern: '^note_[1-9][0-9]*$'}}]
      responses:
        '200': {description: Owner-scoped note detail, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/NoteDetail'}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
        '503': {$ref: '#/components/responses/Unavailable'}
  /api/v1/today:
    get:
      description: Read-only aggregate for the current day in the configured user timezone. It never generates a digest.
      responses:
        '200': {description: Bounded Today aggregate, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/Today'}}}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '500': {$ref: '#/components/responses/InternalError'}
        '503': {$ref: '#/components/responses/Unavailable'}
  /api/v1/tickets:
    get:
      description: Tickets workspace list. Returns current-user structured ticket mentions only, ordered by last_mentioned_at DESC and canonical key DESC. Canonical keys are trimmed, uppercased, and must match examples such as CH-1234, ABC-7, or TEAM42-991. Cursor pagination is opaque, offset-free, and bound to the same query and has_open_actions filters. Search matches canonical ticket keys only; no note-text search, LLM calls, Jira calls, or ticket metadata inference occurs. has_open_actions=true uses open actions whose source note has the same persisted ticket entity. Responses include Cache-Control no-store.
      parameters:
        - {name: limit, in: query, description: Page size. Defaults to 20; values outside 1..50 are rejected., schema: {type: integer, minimum: 1, maximum: 50, default: 20}}
        - {name: cursor, in: query, description: Opaque next_cursor from a prior response for the same filters., schema: {type: string}}
        - {name: query, in: query, description: Case-insensitive canonical ticket-key substring search; trimmed, uppercased, min 2 and max 50 Unicode characters., schema: {type: string, minLength: 2, maxLength: 50}}
        - {name: has_open_actions, in: query, description: When true, include only tickets with open actions on notes that mention the same persisted ticket entity. False or omitted does not filter., schema: {type: boolean}}
      responses:
        '200': {description: Stable newest-mentioned tickets page, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/TicketsListEnvelope'}, examples: {populated: {value: {data: {items: [{key: CH-1234, first_mentioned_at: '2026-05-03T10:15:00Z', last_mentioned_at: '2026-07-19T14:25:00Z', mention_count: 9, open_action_count: 2, recent_note: {id: note_184, created_at: '2026-07-19T14:25:00Z', summary: Reviewed retry-policy implementation.}}], page: {next_cursor: null, has_more: false}}}}, empty: {value: {data: {items: [], page: {next_cursor: null, has_more: false}}}}, search: {summary: Use /api/v1/tickets?query=CH-1234}, pagination: {summary: Use /api/v1/tickets?cursor=<next_cursor>}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/tickets/{key}:
    get:
      description: First-screen ticket workspace detail for a current-user canonical ticket key. Lowercase route keys are normalized to uppercase. Returns persisted ticket profile, up to 20 open actions, up to 10 recent decisions, and up to 20 recent notes. Actions and decisions are associated through source notes with the same persisted ticket entity; no raw-text inference, LLM calls, Jira calls, or metadata inference occurs. Foreign or missing tickets return 404. Responses include Cache-Control no-store.
      parameters: [{name: key, in: path, required: true, description: Human-readable ticket key, normalized to uppercase. Must match ^[A-Za-z][A-Za-z0-9]+-[0-9]+$ and be at most 200 bytes after whitespace normalization., schema: {type: string, pattern: '^[A-Za-z][A-Za-z0-9]+-[0-9]+$', example: CH-1234}}]
      responses:
        '200': {description: Owner-scoped ticket detail, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/TicketWorkspaceEnvelope'}, examples: {populated: {value: {data: {ticket: {key: CH-1234, first_mentioned_at: '2026-05-03T10:15:00Z', last_mentioned_at: '2026-07-19T14:25:00Z', mention_count: 9}, open_actions: [], recent_decisions: [], recent_notes: [], page: {next_cursor: null, has_more: false}}}}, no_open_actions: {value: {data: {ticket: {key: CH-1234, first_mentioned_at: '2026-07-19T14:25:00Z', last_mentioned_at: '2026-07-19T14:25:00Z', mention_count: 1}, open_actions: [], recent_decisions: [], recent_notes: [], page: {next_cursor: null, has_more: false}}}}, missing_ticket: {summary: Missing or foreign ticket returns 404}, invalid_key: {summary: Malformed ticket key returns 400}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/people:
    get:
      description: People workspace list. Returns current-user people with at least one structured people_notes mention, ordered by last_mentioned_at DESC and public person id DESC. Cursor pagination is opaque and offset-free; invalid or mismatched cursors return 400. Search trims whitespace to 2-100 Unicode characters and matches display name or persisted aliases case-insensitively. Optional has_open_actions=true uses persisted linked actions only. Responses include Cache-Control no-store and never run an LLM.
      parameters:
        - {name: limit, in: query, description: Page size. Defaults to 20; values outside 1..50 are rejected., schema: {type: integer, minimum: 1, maximum: 50, default: 20}}
        - {name: cursor, in: query, description: Opaque next_cursor from a prior response for the same filters., schema: {type: string}}
        - {name: query, in: query, description: Case-insensitive display-name or alias search; trimmed, min 2 and max 100 Unicode characters., schema: {type: string, minLength: 2, maxLength: 100}}
        - {name: has_open_actions, in: query, description: When true, include only people with persisted open linked actions. False or omitted does not filter., schema: {type: boolean}}
      responses:
        '200': {description: Stable newest-mentioned people page, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/PeopleListEnvelope'}, examples: {populated: {value: {data: {items: [{id: person_12, display_name: Adlet, aliases: [Адлет], last_mentioned_at: '2026-07-18T13:42:00Z', mention_count: 14, open_action_count: 2, recent_note: {id: note_184, created_at: '2026-07-18T13:42:00Z', summary: Discussed retry policy and ownership.}}], page: {next_cursor: null, has_more: false}}}}, empty: {value: {data: {items: [], page: {next_cursor: null, has_more: false}}}}, search: {summary: Use /api/v1/people?query=Adlet}, pagination: {summary: Use /api/v1/people?cursor=<next_cursor>}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/people/{id}:
    get:
      description: First-screen person workspace detail for a current-user public person id. Returns persisted profile, up to 20 open actions, up to 10 recent decisions, and up to 20 recent notes; never infers from raw text and never runs an LLM. Foreign or missing people return 404.
      parameters: [{name: id, in: path, required: true, schema: {type: string, pattern: '^person_[1-9][0-9]*$'}}]
      responses:
        '200': {description: Owner-scoped person detail, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/PersonWorkspaceEnvelope'}, examples: {populated: {value: {data: {person: {id: person_12, display_name: Adlet, aliases: [Адлет], first_mentioned_at: '2026-03-12T10:00:00Z', last_mentioned_at: '2026-07-18T13:42:00Z', mention_count: 14}, open_actions: [], recent_decisions: [], recent_notes: [], page: {next_cursor: null, has_more: false}}}}, no_open_actions: {value: {data: {person: {id: person_12, display_name: Adlet, aliases: [], first_mentioned_at: '2026-03-12T10:00:00Z', last_mentioned_at: '2026-07-18T13:42:00Z', mention_count: 1}, open_actions: [], recent_decisions: [], recent_notes: [], page: {next_cursor: null, has_more: false}}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/ask:
    post:
      description: Answers a private work-memory question using bounded retrieval from the authenticated user's persisted Lead Log records only. The service does not send entire history to the LLM, does not expose model or prompt settings, validates citations against retrieved records, returns public IDs only, and returns Cache-Control no-store. Time expressions use the authenticated user's stored timezone; optional timezone and response_language request fields are accepted for forward compatibility but not trusted over the user profile.
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/AskRequest'}, examples: {yesterday: {value: {question: What did I do yesterday?}}, ticket: {value: {question: When did I last mention CH-1234?}}, person: {value: {question: What was important regarding Adlet last month?}}, open_actions: {value: {question: Which open actions accumulated?}}}}}}
      responses:
        '200': {description: Grounded answer, clarification, or insufficient-context response, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/AskEnvelope'}, examples: {yesterday_recap: {value: {data: {answer: You discussed retry policy and captured one follow-up., sources: [{type: note, id: note_184, occurred_at: '2026-07-18T13:42:00Z', label: Retry policy discussion, excerpt: Discussed retry policy with the CTO.}], scope: {from: '2026-07-18', to: '2026-07-18'}, confidence: grounded}}}, ticket_last_mention: {value: {data: {answer: The last matching mention I found was CH-1234 on 2026-07-18., sources: [{type: ticket, id: CH-1234, occurred_at: '2026-07-18T13:42:00Z', label: 'ticket: CH-1234', excerpt: Reviewed CH-1234 rollout risk.}], confidence: grounded}}}, insufficient: {value: {data: {answer: I could not find enough context in your notes to answer. Try specifying a person, ticket, or date range., sources: [], confidence: insufficient_context}}}, ambiguous_person: {value: {data: {answer: This person name is ambiguous. Please use a more specific name., sources: [], confidence: insufficient_context}}}, temporary_llm_failure: {summary: Provider failures return 503 with a safe error envelope.}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '413': {description: Request too large, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
        '415': {description: Unsupported media type, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
        '503': {$ref: '#/components/responses/Unavailable'}

  /api/v1/summaries:
    get:
      description: Read-only current-user summaries workspace. Returns daily and weekly agent_response summaries only; GET never calls the LLM. Ordered by period_end DESC, type DESC, id DESC. Date filters use YYYY-MM-DD period intersection semantics. Cursor pagination is opaque and filter-bound. Responses include Cache-Control no-store.
      parameters:
        - {name: type, in: query, schema: {$ref: '#/components/schemas/SummaryType'}, description: Omit to include both daily and weekly summaries.}
        - {name: status, in: query, schema: {$ref: '#/components/schemas/SummaryStatus'}, description: Only ready is currently persisted.}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 50, default: 20}}
        - {name: cursor, in: query, schema: {type: string}, description: Opaque next_cursor valid only with the same filters.}
        - {name: from, in: query, schema: {type: string, format: date}, description: Include summaries whose period intersects this start date or later.}
        - {name: to, in: query, schema: {type: string, format: date}, description: Include summaries whose period intersects this end date or earlier.}
      responses:
        '200': {description: Summary page, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/SummariesEnvelope'}, examples: {daily_and_weekly: {value: {data: {items: [{id: summary_123, type: daily, period: {from: '2026-07-19', to: '2026-07-19'}, status: ready, title: Daily summary for 2026-07-19, preview: Focused on ticket follow-up., generated_at: '2026-07-19T18:00:04Z', source_changed: false}, {id: summary_122, type: weekly, period: {from: '2026-07-13', to: '2026-07-19'}, status: ready, title: Weekly summary for 2026-07-13 to 2026-07-19, preview: Weekly outcomes and open loops., generated_at: '2026-07-19T18:00:04Z', source_changed: true}], page: {next_cursor: null, has_more: false}}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/summaries/{id}:
    get:
      description: Read one current-user summary by public id. Foreign and missing summaries return 404. Structured daily JSON is returned when persisted; legacy text-only summaries use content.text. Sources are bounded public note references when source_note_ids are present in persisted JSON.
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, example: summary_123}}
      responses:
        '200': {description: Summary detail, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/SummaryDetailEnvelope'}, examples: {daily_detail: {value: {data: {summary: {id: summary_123, type: daily, period: {from: '2026-07-19', to: '2026-07-19'}, status: ready, generated_at: '2026-07-19T18:00:04Z', source_changed: false, content: {short_summary: Focused on ticket follow-up., open_loops: [], ticket_candidates: [], people_highlights: [], decisions: [], suggested_next_steps: [], unclear_items: []}, sources: [{type: note, id: note_184, occurred_at: '2026-07-19T09:24:00Z', label: Retry policy discussion., excerpt: Discussed retry policy.}]}}}}, weekly_detail: {value: {data: {summary: {id: summary_124, type: weekly, period: {from: '2026-07-13', to: '2026-07-19'}, status: ready, generated_at: '2026-07-19T18:00:04Z', source_changed: false, content: {text: Weekly summary text}, sources: []}}}}, legacy_text_only: {value: {data: {summary: {id: summary_12, type: weekly, period: {from: '2026-07-13', to: '2026-07-19'}, status: ready, generated_at: '2026-07-19T18:00:04Z', source_changed: true, content: {text: Legacy formatted text}, sources: []}}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/summaries/generate:
    post:
      description: Explicit synchronous summary generation. Request body uses type and anchor_date; the server derives the canonical local daily day or ISO Monday-Sunday week. If force=false and a cache entry matches user, type, period scope, language, prompt version, and source hash, the cached summary is returned without an LLM call. Changed sources regenerate. Empty periods return generated=false, reason=no_source_notes, summary=null.
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/SummaryGenerateRequest'}, examples: {daily: {value: {type: daily, anchor_date: '2026-07-19', force: false}}, weekly: {value: {type: weekly, anchor_date: '2026-07-16', force: false}}, force: {value: {type: daily, anchor_date: '2026-07-19', force: true}}}}}}
      responses:
        '200': {description: Generation result, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/SummaryGenerateEnvelope'}, examples: {fresh_generation: {value: {data: {generated: true, cache_hit: false, period: {from: '2026-07-19', to: '2026-07-19'}, summary: {id: summary_123, type: daily, status: ready}}}}, cached_generation: {value: {data: {generated: false, cache_hit: true, period: {from: '2026-07-19', to: '2026-07-19'}, summary: {id: summary_123, type: daily, status: ready}}}}, no_source_notes: {value: {data: {generated: false, cache_hit: false, reason: no_source_notes, period: {from: '2026-07-19', to: '2026-07-19'}, summary: null}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '503': {$ref: '#/components/responses/Unavailable'}
        '504': {description: Timed out, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
  /api/v1/actions:
    get:
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [open, done, all], default: open}}
        - {$ref: '#/components/parameters/Limit'}
        - {$ref: '#/components/parameters/Cursor'}
      responses:
        '200': {description: Stable newest-first page, content: {application/json: {schema: {$ref: '#/components/schemas/ActionList'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/actions/{id}:
    patch:
      parameters: [{name: id, in: path, required: true, schema: {type: string, pattern: '^action_[1-9][0-9]*$'}}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [status], properties: {status: {type: string, enum: [open, done]}}}}}}
      responses:
        '200': {description: Updated action, content: {application/json: {schema: {type: object, properties: {data: {$ref: '#/components/schemas/Action'}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {description: Action absent in the authenticated user's scope, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
components:
  securitySchemes:
    cookieAuth: {type: apiKey, in: cookie, name: lead_log_session, description: HttpOnly opaque server-side session cookie. Unsafe methods also require an Origin matching FRONTEND_ORIGINS.}
  headers:
    NoStore: {schema: {type: string, const: no-store}}
  parameters:
    Limit: {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
