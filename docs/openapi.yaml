# Snapshot of the Lead Log backend OpenAPI contract.
# Source: lead-log/api/openapi.yaml
# Update this file whenever the frontend starts using a changed API contract.
openapi: 3.1.0
info:
  title: Lead Log private web API
  version: 1.0.0
  description: Multi-user API using HttpOnly opaque session cookies. Browser clients must use credentials: include; unsafe methods require an allowed Origin. Telegram identifiers are never exposed.
servers: [{url: /}]
security: [{cookieAuth: []}]
paths:
  /healthz:
    get:
      security: []
      responses: {'200': {description: Process is alive, content: {application/json: {schema: {$ref: '#/components/schemas/Health'}}}}}
  /readyz:
    get:
      security: []
      responses:
        '200': {description: Database is ready, content: {application/json: {schema: {$ref: '#/components/schemas/Ready'}}}}
        '503': {description: Database is unavailable, content: {application/json: {schema: {$ref: '#/components/schemas/Ready'}}}}
  /api/v1/auth/register:
    post:
      security: []
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RegisterRequest'}}}}
      responses:
        '201': {description: Registered and session cookie set, content: {application/json: {schema: {$ref: '#/components/schemas/CurrentUserEnvelope'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '409': {description: Duplicate account, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
  /api/v1/auth/login:
    post:
      security: []
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/LoginRequest'}}}}
      responses:
        '200': {description: Logged in and session cookie set, content: {application/json: {schema: {$ref: '#/components/schemas/CurrentUserEnvelope'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/auth/logout:
    post:
      responses:
        '204': {description: Current session revoked and cookie cleared}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/auth/session:
    get:
      responses:
        '200': {description: Current session, content: {application/json: {schema: {$ref: '#/components/schemas/CurrentUserEnvelope'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/integrations/telegram/link:
    post:
      description: Creates a short-lived one-time Telegram bot deep link. The token is random, stored hashed, and not logged.
      responses:
        '200': {description: Deep link, content: {application/json: {schema: {$ref: '#/components/schemas/TelegramLinkEnvelope'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/integrations/telegram/status:
    get:
      responses:
        '200': {description: Telegram connection status without Telegram identifiers, content: {application/json: {schema: {type: object, properties: {data: {$ref: '#/components/schemas/TelegramStatus'}}}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/integrations/telegram:
    delete:
      responses:
        '204': {description: Telegram account unlinked; historical user data remains}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/me:
    get:
      responses:
        '200': {description: Safe current-user profile, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/Me'}}}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/notes:
    get:
      description: Notes history page. Returns private current-user notes only, ordered by created_at DESC and id DESC. Cursor pagination is opaque, preserves the normalized filter context, and does not use offsets. Date filters use YYYY-MM-DD calendar dates in the authenticated user's stored timezone; from is inclusive local start-of-day and to is inclusive local calendar day converted internally to a half-open UTC range. Search trims whitespace, requires 2-200 Unicode characters when present, searches persisted raw text and summary only, and never calls an LLM. Responses include Cache-Control no-store.
      parameters:
        - {name: limit, in: query, description: Page size. Defaults to 20; values outside 1..50 are rejected., schema: {type: integer, minimum: 1, maximum: 50, default: 20}}
        - {name: cursor, in: query, description: Opaque next_cursor from a prior response. It is valid only with the same explicit filters; invalid or mismatched cursors return 400., schema: {type: string}}
        - {name: from, in: query, description: Inclusive local start date in authenticated user's timezone (YYYY-MM-DD). May be omitted., schema: {type: string, format: date, example: '2026-07-01'}}
        - {name: to, in: query, description: Inclusive local end date in authenticated user's timezone (YYYY-MM-DD). May be omitted., schema: {type: string, format: date, example: '2026-07-17'}}
        - {name: status, in: query, description: Exact canonical processing status. Omit to include pending, processing, processed, and failed notes., schema: {$ref: '#/components/schemas/ProcessingStatus'}}
        - {name: query, in: query, description: Case-insensitive substring search over persisted raw note text and summary. Trimmed; empty is absent; non-empty must be 2-200 Unicode characters., schema: {type: string, minLength: 2, maxLength: 200}}
      responses:
        '200': {description: Stable newest-first notes history page, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/NotesHistoryEnvelope'}, examples: {first_page: {value: {data: {items: [{id: note_184, raw_text: Discussed retry policy with Adlet., summary: Retry policy discussion., processing_status: processed, created_at: '2026-07-17T09:24:00Z', processed_at: '2026-07-17T09:24:04Z', extracted_counts: {actions: 2, people: 1, decisions: 1, entities: 2}, preview: {people: [{id: person_12, display_name: Adlet}], tickets: [CH-1234], tags: [message-processor]}}], page: {next_cursor: opaque-cursor, has_more: true}}}}, empty_result: {value: {data: {items: [], page: {next_cursor: null, has_more: false}}}}, date_range: {summary: Use /api/v1/notes?from=2026-07-01&to=2026-07-17}, status_filter: {summary: Use /api/v1/notes?status=processed}, search_query: {summary: Use /api/v1/notes?query=retry%20policy}, next_page: {summary: Use /api/v1/notes?cursor=<next_cursor> with the same filters}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
    post:
      description: Creates a pending note without waiting for LLM enrichment. Not idempotent in API v1.
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [text], properties: {text: {type: string, minLength: 1, maxLength: 10000}}, example: {text: Discuss retry policy with the team.}}}}}
      responses:
        '201': {description: Pending note created, content: {application/json: {schema: {type: object, properties: {data: {$ref: '#/components/schemas/NoteCreated'}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '413': {description: Request too large, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
        '415': {description: Unsupported media type, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
  /api/v1/notes/{id}:
    get:
      description: Returns the persisted note and its bounded structured enrichment; never starts enrichment.
      parameters: [{name: id, in: path, required: true, schema: {type: string, pattern: '^note_[1-9][0-9]*$'}}]
      responses:
        '200': {description: Owner-scoped note detail, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/NoteDetail'}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '500': {$ref: '#/components/responses/InternalError'}
        '503': {$ref: '#/components/responses/Unavailable'}
  /api/v1/today:
    get:
      description: Read-only aggregate for the current day in the configured user timezone. It never generates a digest.
      responses:
        '200': {description: Bounded Today aggregate, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/Today'}}}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '500': {$ref: '#/components/responses/InternalError'}
        '503': {$ref: '#/components/responses/Unavailable'}
  /api/v1/people:
    get:
      description: People workspace list. Returns current-user people with at least one structured people_notes mention, ordered by last_mentioned_at DESC and public person id DESC. Cursor pagination is opaque and offset-free; invalid or mismatched cursors return 400. Search trims whitespace to 2-100 Unicode characters and matches display name or persisted aliases case-insensitively. Optional has_open_actions=true uses persisted linked actions only. Responses include Cache-Control no-store and never run an LLM.
      parameters:
        - {name: limit, in: query, description: Page size. Defaults to 20; values outside 1..50 are rejected., schema: {type: integer, minimum: 1, maximum: 50, default: 20}}
        - {name: cursor, in: query, description: Opaque next_cursor from a prior response for the same filters., schema: {type: string}}
        - {name: query, in: query, description: Case-insensitive display-name or alias search; trimmed, min 2 and max 100 Unicode characters., schema: {type: string, minLength: 2, maxLength: 100}}
        - {name: has_open_actions, in: query, description: When true, include only people with persisted open linked actions. False or omitted does not filter., schema: {type: boolean}}
      responses:
        '200': {description: Stable newest-mentioned people page, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/PeopleListEnvelope'}, examples: {populated: {value: {data: {items: [{id: person_12, display_name: Adlet, aliases: [Адлет], last_mentioned_at: '2026-07-18T13:42:00Z', mention_count: 14, open_action_count: 2, recent_note: {id: note_184, created_at: '2026-07-18T13:42:00Z', summary: Discussed retry policy and ownership.}}], page: {next_cursor: null, has_more: false}}}}, empty: {value: {data: {items: [], page: {next_cursor: null, has_more: false}}}}, search: {summary: Use /api/v1/people?query=Adlet}, pagination: {summary: Use /api/v1/people?cursor=<next_cursor>}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/people/{id}:
    get:
      description: First-screen person workspace detail for a current-user public person id. Returns persisted profile, up to 20 open actions, up to 10 recent decisions, and up to 20 recent notes; never infers from raw text and never runs an LLM. Foreign or missing people return 404.
      parameters: [{name: id, in: path, required: true, schema: {type: string, pattern: '^person_[1-9][0-9]*$'}}]
      responses:
        '200': {description: Owner-scoped person detail, headers: {Cache-Control: {$ref: '#/components/headers/NoStore'}}, content: {application/json: {schema: {$ref: '#/components/schemas/PersonWorkspaceEnvelope'}, examples: {populated: {value: {data: {person: {id: person_12, display_name: Adlet, aliases: [Адлет], first_mentioned_at: '2026-03-12T10:00:00Z', last_mentioned_at: '2026-07-18T13:42:00Z', mention_count: 14}, open_actions: [], recent_decisions: [], recent_notes: [], page: {next_cursor: null, has_more: false}}}}, no_open_actions: {value: {data: {person: {id: person_12, display_name: Adlet, aliases: [], first_mentioned_at: '2026-03-12T10:00:00Z', last_mentioned_at: '2026-07-18T13:42:00Z', mention_count: 1}, open_actions: [], recent_decisions: [], recent_notes: [], page: {next_cursor: null, has_more: false}}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/v1/actions:
    get:
      parameters:
      - {name: status, in: query, schema: {type: string, enum: [open, done, all], default: open}}
      - {$ref: '#/components/parameters/Limit'}
      - {$ref: '#/components/parameters/Cursor'}
      responses:
        '200': {description: Stable newest-first page, content: {application/json: {schema: {$ref: '#/components/schemas/ActionList'}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
  /api/v1/actions/{id}:
    patch:
      parameters: [{name: id, in: path, required: true, schema: {type: string, pattern: '^action_[1-9][0-9]*$'}}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: false, required: [status], properties: {status: {type: string, enum: [open, done]}}}}}}
      responses:
        '200': {description: Updated action, content: {application/json: {schema: {type: object, properties: {data: {$ref: '#/components/schemas/Action'}}}}}}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {description: Action absent in the authenticated user's scope, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
components:
  securitySchemes:
    cookieAuth: {type: apiKey, in: cookie, name: lead_log_session, description: HttpOnly opaque server-side session cookie. Unsafe methods also require an Origin matching FRONTEND_ORIGINS.}
  headers:
    NoStore: {schema: {type: string, const: no-store}}
  parameters:
    Limit: {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    Cursor: {name: cursor, in: query, description: Opaque cursor, schema: {type: string}}
  responses:
    Unauthorized: {description: Authentication failed without disclosing why, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    BadRequest: {description: Invalid input, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    NotFound: {description: Resource is absent in the authenticated user's scope, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    InternalError: {description: Safe internal error, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Unavailable: {description: Service unavailable, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
  schemas:
    Health: {type: object, required: [status], properties: {status: {const: ok}}}
    Ready: {type: object, required: [status], properties: {status: {enum: [ready, not_ready]}}}
    Me: {type: object, required: [display_name, response_language, timezone, email], properties: {display_name: {type: string, maxLength: 100, default: ''}, email: {type: string, format: email}, response_language: {type: string, enum: [en, uk], default: en}, timezone: {type: string, default: Europe/Warsaw, example: Europe/Warsaw}}}
    RegisterRequest: {type: object, additionalProperties: false, required: [email, password], properties: {email: {type: string, format: email}, password: {type: string, minLength: 12, maxLength: 128}, display_name: {type: string, maxLength: 100, default: '', description: Optional display name; leading and trailing whitespace is trimmed.}, timezone: {type: string, default: Europe/Warsaw, example: Europe/Warsaw, description: Optional IANA timezone.}, response_language: {type: string, enum: [en, uk], default: en}}}
    LoginRequest: {type: object, additionalProperties: false, required: [email, password], properties: {email: {type: string, format: email}, password: {type: string}}}
    TelegramStatus: {type: object, required: [connected, linked_at], properties: {connected: {type: boolean}, linked_at: {type: [string, 'null'], format: date-time}}}
    CurrentUserEnvelope: {type: object, required: [data], properties: {data: {type: object, required: [user, telegram], properties: {user: {$ref: '#/components/schemas/Me'}, telegram: {$ref: '#/components/schemas/TelegramStatus'}}}}}
    TelegramLinkEnvelope: {type: object, required: [data], properties: {data: {type: object, required: [url, expires_at], properties: {url: {type: string, format: uri}, expires_at: {type: string, format: date-time}}}}}
    Pagination: {type: object, required: [limit, next_cursor], properties: {limit: {type: integer}, next_cursor: {type: [string, 'null']}}}
    Note: {type: object, required: [id, raw_text, tags, processing_status, created_at], properties: {id: {type: string, example: note_123}, raw_text: {type: string}, summary: {type: [string, 'null']}, tags: {type: array, items: {type: string}}, processing_status: {enum: [pending, processing, processed, failed]}, created_at: {type: string, format: date-time}}}
    NoteCreated: {type: object, required: [id, processing_status, created_at], properties: {id: {type: string}, processing_status: {const: pending}, created_at: {type: string, format: date-time}}}
    NoteList: {type: object, properties: {data: {type: array, items: {$ref: '#/components/schemas/Note'}}, pagination: {$ref: '#/components/schemas/Pagination'}}}
    NotesPage: {type: object, required: [next_cursor, has_more], properties: {next_cursor: {type: [string, 'null']}, has_more: {type: boolean}}}
    NotesHistory: {type: object, required: [items, page], properties: {items: {type: array, items: {$ref: '#/components/schemas/TodayNote'}}, page: {$ref: '#/components/schemas/NotesPage'}}}
    NotesHistoryEnvelope: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/NotesHistory'}}}
    Person: {type: object, required: [display_name], properties: {display_name: {type: string}}}
    PeopleListEnvelope: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/PeopleList'}}}
    PeopleList: {type: object, required: [items, page], properties: {items: {type: array, items: {$ref: '#/components/schemas/PeopleListItem'}}, page: {$ref: '#/components/schemas/NotesPage'}}}
    PeopleListItem: {type: object, required: [id, display_name, aliases, last_mentioned_at, mention_count, open_action_count, recent_note], properties: {id: {type: string, example: person_12}, display_name: {type: string}, aliases: {type: array, maxItems: 10, items: {type: string}}, last_mentioned_at: {type: string, format: date-time}, mention_count: {type: integer}, open_action_count: {type: integer}, recent_note: {oneOf: [{$ref: '#/components/schemas/PeopleRecentNote'}, {type: 'null'}]}}}
    PeopleRecentNote: {type: object, required: [id, created_at, summary], properties: {id: {type: string, example: note_184}, created_at: {type: string, format: date-time}, summary: {type: [string, 'null']}, raw_text_preview: {type: string, maxLength: 400}, processing_status: {$ref: '#/components/schemas/ProcessingStatus'}, tickets: {type: array, maxItems: 3, items: {type: string}}}}
    PersonWorkspaceEnvelope: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/PersonWorkspaceDetail'}}}
    PersonProfile: {type: object, required: [id, display_name, aliases, first_mentioned_at, last_mentioned_at, mention_count], properties: {id: {type: string, example: person_12}, display_name: {type: string}, aliases: {type: array, maxItems: 10, items: {type: string}}, first_mentioned_at: {type: string, format: date-time}, last_mentioned_at: {type: string, format: date-time}, mention_count: {type: integer}}}
    PersonWorkspaceDetail: {type: object, required: [person, open_actions, recent_decisions, recent_notes, page], properties: {person: {$ref: '#/components/schemas/PersonProfile'}, open_actions: {type: array, maxItems: 20, items: {$ref: '#/components/schemas/Action'}}, recent_decisions: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/Decision'}}, recent_notes: {type: array, maxItems: 20, items: {$ref: '#/components/schemas/PeopleRecentNote'}}, page: {$ref: '#/components/schemas/NotesPage'}}}
    Action: {type: object, required: [id, title, status, created_at], properties: {id: {type: string, example: action_31}, title: {type: string}, status: {enum: [open, done]}, linked_person: {oneOf: [{$ref: '#/components/schemas/Person'}, {type: 'null'}]}, due_at: {type: [string, 'null'], format: date-time}, created_at: {type: string, format: date-time}, completed_at: {type: [string, 'null'], format: date-time}, source_note_id: {type: [string, 'null']}}}
    ActionList: {type: object, properties: {data: {type: array, items: {$ref: '#/components/schemas/Action'}}, pagination: {$ref: '#/components/schemas/Pagination'}}}
    ProcessingStatus: {type: string, enum: [pending, processing, processed, failed]}
    PersonPreview: {type: object, required: [id, display_name], properties: {id: {type: string, example: person_12}, display_name: {type: string}}}
    ExtractedCounts: {type: object, required: [actions, people, decisions, entities], properties: {actions: {type: integer}, people: {type: integer}, decisions: {type: integer}, entities: {type: integer}}}
    NotePreviewMetadata: {type: object, required: [people, tickets, tags], properties: {people: {type: array, maxItems: 3, items: {$ref: '#/components/schemas/PersonPreview'}}, tickets: {type: array, maxItems: 3, items: {type: string}}, tags: {type: array, maxItems: 3, items: {type: string}}}}
    TodayNote: {type: object, required: [id, raw_text, summary, processing_status, created_at, processed_at, extracted_counts, preview], properties: {id: {type: string, example: note_184}, raw_text: {type: string, maxLength: 400}, summary: {type: [string, 'null']}, processing_status: {$ref: '#/components/schemas/ProcessingStatus'}, created_at: {type: string, format: date-time}, processed_at: {type: [string, 'null'], format: date-time}, extracted_counts: {$ref: '#/components/schemas/ExtractedCounts'}, preview: {$ref: '#/components/schemas/NotePreviewMetadata'}}}
    DailyCounters: {type: object, required: [open_loops, decisions, people_mentioned], properties: {open_loops: {type: integer}, decisions: {type: integer}, people_mentioned: {type: integer}}}
    DailySummary: {type: object, required: [date, status, counters, generated_at], properties: {date: {type: string, format: date}, status: {enum: [available, not_available]}, short_summary: {type: string}, counters: {$ref: '#/components/schemas/DailyCounters'}, generated_at: {type: [string, 'null'], format: date-time}}}
    Today: {type: object, required: [date, timezone, notes, open_actions, daily_summary], properties: {date: {type: string, format: date, example: '2026-07-17'}, timezone: {type: string, example: Europe/Warsaw}, notes: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/TodayNote'}}, open_actions: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/Action'}}, daily_summary: {$ref: '#/components/schemas/DailySummary'}}}
    PeopleHighlight: {type: object, required: [type, theme, text], properties: {type: {type: string, example: collaboration}, theme: {type: string}, text: {type: string}}}
    PersonDetail: {allOf: [{$ref: '#/components/schemas/PersonPreview'}, {type: object, required: [highlights], properties: {highlights: {type: array, items: {$ref: '#/components/schemas/PeopleHighlight'}}}}]}
    Decision: {type: object, required: [id, text, status], properties: {id: {type: string, example: decision_18}, text: {type: string}, status: {type: string, example: active}, topic: {type: string}}}
    Entity: {type: object, required: [type, value], properties: {type: {enum: [ticket, project, service, component, repository, document, other]}, value: {type: string}}}
    NoteDetail: {type: object, required: [id, raw_text, summary, processing_status, created_at, processed_at, actions, people, decisions, entities], properties: {id: {type: string}, raw_text: {type: string}, summary: {type: [string, 'null']}, processing_status: {$ref: '#/components/schemas/ProcessingStatus'}, created_at: {type: string, format: date-time}, processed_at: {type: [string, 'null'], format: date-time}, actions: {type: array, maxItems: 50, items: {$ref: '#/components/schemas/Action'}}, people: {type: array, items: {$ref: '#/components/schemas/PersonDetail'}}, decisions: {type: array, maxItems: 50, items: {$ref: '#/components/schemas/Decision'}}, entities: {type: array, maxItems: 50, items: {$ref: '#/components/schemas/Entity'}}}}
    APIError: {type: object, required: [code, message, request_id], properties: {code: {enum: [unauthorized, forbidden, validation_error, not_found, conflict, request_too_large, unsupported_media_type, internal_error, service_unavailable]}, message: {type: string}, request_id: {type: string}, fields: {type: object, additionalProperties: {type: string}, description: Safe field-level validation messages keyed by request field name.}}}
    ErrorEnvelope: {type: object, required: [error], properties: {error: {$ref: '#/components/schemas/APIError'}}}
